name: grade_master
description: A professional student grade management and GPA calculation app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  
  # Local Storage & Sessions
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Excel Import/Export
  excel: ^4.0.2
  file_picker: ^10.3.10
  archive: ^3.6.1
  xml: ^6.6.1
  
  # PDF Export
  pdf: ^3.10.7
  printing: ^5.11.1
  
  # File Operations
  path_provider: ^2.1.2
  share_plus: ^7.2.1
  permission_handler: ^11.2.0
  
  # Camera/Scanner
  mobile_scanner: ^3.5.6
  camera: ^0.10.5+5
  
  # UI Components
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  fl_chart: ^0.66.2
  shimmer: ^3.0.0
  intl: ^0.19.0
  uuid: ^4.3.3
  
  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
